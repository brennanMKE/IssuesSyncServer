<VirtualHost *:443>
    ServerName sync.sstools.co

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/sync.sstools.co/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/sync.sstools.co/privkey.pem

    # WebSocket upgrade must appear before the catch-all ProxyPass.
    ProxyPass        /v1/events ws://127.0.0.1:8080/v1/events
    ProxyPassReverse /v1/events ws://127.0.0.1:8080/v1/events

    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    ProxyTimeout 3600

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host  "%{HTTP_HOST}e"
</VirtualHost>

<VirtualHost *:80>
    ServerName sync.sstools.co
    Redirect permanent / https://sync.sstools.co/
</VirtualHost>
